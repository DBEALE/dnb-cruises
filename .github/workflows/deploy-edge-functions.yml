name: Deploy Supabase Edge Functions

on:
  push:
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy edge functions
        run: |
          supabase functions deploy subscribe --project-ref yttgqscwgmsnewdjqbcc --no-verify-jwt
          supabase functions deploy twilio-webhook --project-ref yttgqscwgmsnewdjqbcc --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
