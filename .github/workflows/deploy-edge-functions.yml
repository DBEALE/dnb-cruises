name: Deploy Supabase Edge Functions

on:
  push:
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:

# Least-privilege: this job does not push to any branch, only to
# Supabase via a project-scoped access token.
permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: supabase/setup-cli@3c2f5e2ae34c34e428e8e206e2c4d21fa2d20fbf # v2.1.1
        with:
          version: latest

      - name: Deploy edge functions
        run: |
          supabase functions deploy subscribe --project-ref yttgqscwgmsnewdjqbcc --no-verify-jwt
          supabase functions deploy twilio-webhook --project-ref yttgqscwgmsnewdjqbcc --no-verify-jwt
          supabase functions deploy visitor-count --project-ref yttgqscwgmsnewdjqbcc --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
