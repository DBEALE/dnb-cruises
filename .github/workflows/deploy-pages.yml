name: Scrape and Deploy

on:
  schedule:
    - cron: '0 */2 * * *'  # every 2 hours (GitHub may skip during high load)
  workflow_dispatch:

permissions:
  contents: write   # needed to push audit snapshots to the 'data' branch
  pages:    write
  id-token: write

concurrency:
  # Serialise with the push-deploy workflow (same group). Do NOT cancel an
  # in-progress deploy — cancelling mid-deployment leaves the Pages environment
  # unable to accept the next one ("Deployment failed, try again later").
  # Queue instead, per GitHub's recommended Pages setup.
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Generate build info
        run: node scripts/generate-build-info.js

      # The deployed Pages copy is the source of truth for cruise data — pull
      # it into the workspace so fetch-cruises.js can merge against last-known
      # state (price history, archive). 404s on first deploy are tolerated.
      - name: Fetch live cruise data from Pages
        run: node scripts/fetch-live-cruise-data.js

      - name: Fetch cruise data
        run: node scripts/fetch-cruises.js
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ALERT_EMAIL:    ${{ secrets.ALERT_EMAIL }}

      # Persist the fresh cruises.json + oldCruises.json to the 'data' branch
      # as an audit log. The branch is an orphan (no shared history with main)
      # holding only the cruise files — small clones, easy to prune.
      - name: Persist data snapshot to 'data' branch
        continue-on-error: true   # audit log is best-effort; never block the Pages deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          DATA_DIR="$RUNNER_TEMP/data-branch"
          REPO_URL="https://x-access-token:$GITHUB_TOKEN@github.com/${{ github.repository }}.git"

          if git ls-remote --exit-code --heads "$REPO_URL" data >/dev/null 2>&1; then
            git clone --branch data --single-branch --depth 1 "$REPO_URL" "$DATA_DIR"
          else
            echo "→ 'data' branch does not exist; creating as orphan"
            git clone --depth 1 "$REPO_URL" "$DATA_DIR"
            (cd "$DATA_DIR" && git checkout --orphan data && git rm -rf . || true)
          fi

          # Mirror fresh data files into the data-branch checkout
          for provider_dir in public/providers/*/; do
            provider=$(basename "$provider_dir")
            mkdir -p "$DATA_DIR/public/providers/$provider"
            for f in cruises.json oldCruises.json price-history.json; do
              src="$provider_dir$f"
              [ -f "$src" ] && cp "$src" "$DATA_DIR/public/providers/$provider/$f"
            done
          done

          cd "$DATA_DIR"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/providers
          if git diff --cached --quiet; then
            echo "No cruise data changes; nothing to commit."
          else
            git commit -m "data: snapshot $(date -u +%Y-%m-%dT%H:%MZ)"
            git push origin data
          fi

      - name: Notify WhatsApp subscribers
        run: node scripts/notify-subscribers.js
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TWILIO_ACCOUNT_SID:        ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN:         ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_WHATSAPP_FROM:      ${{ secrets.TWILIO_WHATSAPP_FROM }}

      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: public/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
