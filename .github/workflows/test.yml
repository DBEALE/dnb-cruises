name: Test

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege: tests don't push to any branch.
permissions:
  contents: read

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit
        # test:unit runs only the Node test runner (no Playwright, no
        # network, no web server) so the job is fast and deterministic.
