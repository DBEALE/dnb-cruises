name: Deploy on Push

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  # Shares the "pages" group with the scheduled scrape+deploy workflow so only
  # one Pages deployment runs at a time. cancel-in-progress is false so an
  # in-progress deploy completes rather than being cancelled mid-flight (which
  # causes "Deployment failed, try again later").
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      - name: Generate build info
        run: node scripts/generate-build-info.js

      # Cruise data is gitignored; the deployed Pages copy is master. Pull
      # it into public/ so the redeploy preserves it instead of publishing
      # an empty providers/ directory.
      - name: Fetch live cruise data from Pages
        run: node scripts/fetch-live-cruise-data.js

      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: public/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
