version: 2
updates:
  # Keep pinned GitHub Actions SHAs current (e.g. Node-runtime bumps) so we
  # don't drift into deprecated-runtime warnings again. Grouped into one PR.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]

  # npm dependencies.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      npm:
        patterns: ["*"]
