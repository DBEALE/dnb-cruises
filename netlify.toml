[build]
  command   = "node scripts/generate-build-info.js"
  publish   = "public"
  functions = "netlify/functions"

[build.environment]
  FIRECRAWL_API_KEY = "fc-25a2413cbda146498c5cfbbbaa4df718"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/scrape"
  to   = "/.netlify/functions/scrape-background"
  status = 200

[[redirects]]
  from = "/api/cruises"
  to   = "/.netlify/functions/cruises"
  status = 200
